<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | SkillPace</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 50px;
  border-radius: 12px;
  width: 350px;
}

input {
  width: 70%;
  padding: 10px;
  margin: 10px 0;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

button {
  width: 40%;
  padding: 12px;
  background: #FBC156;
  border: none;
  display: block; 
  margin-left: auto;
  margin-right: auto;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h2>Register</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="register()">Create Account</button>

  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKeRzaLsLzLajQ6DrO_wyIJTFO31fSZtU",
  authDomain: "skillpace-36741.firebaseapp.com",
  databaseURL: "https://skillpace-36741-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "skillpace-36741",
  storageBucket: "skillpace-36741.firebasestorage.app",
  messagingSenderId: "680592513115",
  appId: "1:680592513115:web:7a67b2ea17fa0a888dc77e",
  measurementId: "G-F8PQBFMY1M"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = async function() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(userCred.user, { displayName: name });

    alert("Account created!");
    window.location.href = "login.html";
  } catch (e) {
    alert(e.message);
  }
};
</script>

</body>
</html>
